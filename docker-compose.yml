services:
  api:
    build: .
    ports:
      - "${APP_PORT_LOCAL:-8000}:${APP_PORT_LOCAL:-8000}"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port ${APP_PORT_LOCAL:-8000} --reload"
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: personal_space
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
