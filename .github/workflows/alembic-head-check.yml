name: Alembic Head Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  alembic-head-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Verify Alembic has a single head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/personal_space
          VAULT_ENCRYPTION_SECRET: ci-placeholder-secret
          JWT_SECRET: ci-placeholder-jwt-secret
          ALLOWED_ORIGINS: http://localhost:3000
        run: ./scripts/check_alembic_heads.sh
